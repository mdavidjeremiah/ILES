services:
  - type: web
    name: django-app
    runtime: python
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_SKIP_ENV_FILES
        value: "true"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,testserver,iles-beta.vercel.app,iles-1.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,https://iles-beta.vercel.app,https://iles-1.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.vercel\\.app$"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://iles-beta.vercel.app,https://iles-1.onrender.com"
      - key: DJANGO_TIME_ZONE
        value: "Africa/Nairobi"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "true"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "true"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "false"
      - key: DATABASE_CONN_MAX_AGE
        value: "60"
      - key: NEON_DATABASE_URL
        sync: false