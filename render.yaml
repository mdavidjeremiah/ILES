services:
  - type: web
    name: django-app
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,testserver,iles-beta.vercel.app,iles-1.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,https://iles-beta.vercel.app,https://iles-1.onrender.com"
      - key: DJANGO_TIME_ZONE
        value: "Africa/Nairobi"
      - key: DATABASE_CONN_MAX_AGE
        value: "60"
      - key: NEON_DATABASE_URL
        sync: false