services:
  - type: web
    name: django-app
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    plan: free
    envVars:
      - key: DJANGO_DEBUG
        value: false

      - key: DJANGO_SECRET_KEY
        generateValue: true   # Render will auto-generate; override in dashboard if needed

      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1,testserver  # Render will inject your service's hostname automatically

      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174

      - key: DJANGO_TIME_ZONE
        value: Africa/Nairobi

      - key: NEON_DATABASE_URL
        sync: false   # Set this secret in the Render dashboard — never commit the real value

      - key: DATABASE_CONN_MAX_AGE
        value: 60

      - key: PYTHON_VERSION
        value: 3.12.0